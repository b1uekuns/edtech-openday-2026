<!-- VR TOUR -->
<section id="recap" class="section rv">
  <div class="section__hd" style="text-align: center">
    <h2 class="section__title--decorated">
      <img
        src="assets/img/svg/vr-cardboard.svg"
        class="svg-icon"
        style="
          width: 32px;
          height: 32px;
          filter: invert(65%) sepia(40%) saturate(800%) hue-rotate(220deg)
            brightness(100%) contrast(95%);
          margin-right: 0.5rem;
        "
        alt="VR"
      />
      VR360 VIRTUAL TOUR &ndash; KHÁM PHÁ TRƯỜNG &amp; KHOA
      <span style="color: var(--indigo); margin-left: 0.5rem">✦</span>
    </h2>
  </div>

  <div class="vr-wrapper">
    <div class="vr-grid">
      <div class="recap-card recap-card--main" style="grid-column: span 1">
        <div class="recap-card__thumb recap-card__thumb--1">
          <div class="recap-card__scan"></div>
          <button class="play-btn" aria-label="Khám phá">
            <div class="play-btn__tri" aria-hidden="true"></div>
          </button>
          <img src="assets/img/vr/vr1.jpg" alt="HUST" />
        </div>
      </div>

      <div class="recap-card recap-card--main" style="grid-column: span 1">
        <div class="recap-card__thumb recap-card__thumb--2">
          <div class="recap-card__scan"></div>
          <button class="play-btn" aria-label="Khám phá">
            <div class="play-btn__tri" aria-hidden="true"></div>
          </button>
          <img src="assets/img/vr/vr2.jpg" alt="Building" />
        </div>
      </div>
    </div>

    <div class="vr-features">
      <div class="vr-feature">
        <div class="vr-feature__icon">
          <img
            src="assets/img/svg/touch-1-filled.svg"
            class="svg-icon"
            alt="Touch"
          />
        </div>
        <div class="vr-feature__text">Tương tác 360&deg;<br />chân thực</div>
      </div>
      <div class="vr-feature">
        <div class="vr-feature__icon">
          <img
            src="assets/img/svg/user-group.svg"
            class="svg-icon"
            alt="User"
          />
        </div>
        <div class="vr-feature__text">Tự do khám phá<br />mọi góc nhìn</div>
      </div>
      <div class="vr-feature">
        <div class="vr-feature__icon">
          <img
            src="assets/img/svg/briefcase.svg"
            class="svg-icon"
            alt="Monitor"
          />
        </div>
        <div class="vr-feature__text">Trải nghiệm trên mọi<br />thiết bị</div>
      </div>
      <div class="vr-feature">
        <div class="vr-feature__icon">
          <img src="assets/img/svg/gift.svg" class="svg-icon" alt="Gift" />
        </div>
        <div class="vr-feature__text">
          Không cần cài đặt<br />đơn giản, dễ dùng
        </div>
      </div>

      <div class="vr-action">
        <a href="#" class="vr-btn">Bắt đầu khám phá ngay &rarr;</a>
      </div>
    </div>
  </div>
</section>

<div class="divider"></div>
